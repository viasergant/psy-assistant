<div class="password-change-container">
  <div class="password-change-card">
    <div class="card-header">
      <h1>Welcome!</h1>
      <p class="subtitle">Before you begin, please set a secure password</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="password-form">
      <!-- Current Password -->
      <div class="form-field">
        <label for="currentPassword" class="field-label">Current Temporary Password *</label>
        <p-password
          id="currentPassword"
          formControlName="currentPassword"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Enter your temporary password"
          styleClass="w-full"
          inputStyleClass="w-full"
          [class.ng-invalid]="currentPassword?.invalid && currentPassword?.touched">
        </p-password>
        <small class="error-text" *ngIf="currentPassword?.invalid && currentPassword?.touched">
          Current password is required
        </small>
      </div>

      <!-- New Password -->
      <div class="form-field">
        <label for="newPassword" class="field-label">New Password *</label>
        <p-password
          id="newPassword"
          formControlName="newPassword"
          [feedback]="true"
          [toggleMask]="true"
          placeholder="Enter your new password"
          promptLabel="Choose a password"
          weakLabel="Weak"
          mediumLabel="Medium"
          strongLabel="Strong"
          styleClass="w-full"
          inputStyleClass="w-full"
          [class.ng-invalid]="newPassword?.invalid && newPassword?.touched">
        </p-password>
        <small class="hint-text" *ngIf="!newPassword?.touched">
          Minimum 10 characters with uppercase, lowercase, number, and special character
        </small>
        <small class="error-text" *ngIf="newPassword?.invalid && newPassword?.touched">
          Password must be at least 10 characters long
        </small>
      </div>

      <!-- Confirm Password -->
      <div class="form-field">
        <label for="confirmPassword" class="field-label">Confirm New Password *</label>
        <p-password
          id="confirmPassword"
          formControlName="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Re-enter your new password"
          styleClass="w-full"
          inputStyleClass="w-full"
          [class.ng-invalid]="(confirmPassword?.invalid || passwordMismatch) && confirmPassword?.touched">
        </p-password>
        <small class="error-text" *ngIf="passwordMismatch">
          Passwords do not match
        </small>
      </div>

      <!-- Error Message -->
      <p-message
        *ngIf="errorMessage"
        severity="error"
        [text]="errorMessage"
        styleClass="w-full mt-3">
      </p-message>

      <!-- Submit Button -->
      <div class="form-actions">
        <p-button
          type="submit"
          label="Change Password & Continue"
          icon="pi pi-check"
          [loading]="loading"
          [disabled]="form.invalid"
          styleClass="w-full">
        </p-button>
      </div>
    </form>
  </div>
</div>
