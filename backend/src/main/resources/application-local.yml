spring:
  flyway:
    clean-disabled: false   # required for LocalFlywayConfig; clean() is blocked by default in Flyway 9+
    locations: classpath:db/migration,classpath:db/local-seed
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.10.146:5432/psyassistant}
    username: ${DB_USERNAME:psyassistant}
    password: ${DB_PASSWORD:psyassistant}
  jpa:
    hibernate:
      ddl-auto: none   # Flyway owns DDL; create-drop conflicts with flyway_schema_history
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-change-me-32-bytes-minimum}

session:
  notes:
    # Local dev key: base64-encoded 32-byte AES-256 key (DO NOT use in production)
    encryption-key: ${SESSION_NOTES_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,env,beans
logging:
  level:
    root: INFO
    com.psyassistant: DEBUG
