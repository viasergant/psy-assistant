version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: psyassistant
      POSTGRES_USER: psyassistant
      POSTGRES_PASSWORD: psyassistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psyassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
