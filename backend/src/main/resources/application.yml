spring:
  application:
    name: psy-assistant
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.10.146:5432/psyassistant}
    username: ${DB_USERNAME:psyassistant}
    password: ${DB_PASSWORD:psyassistant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 10s
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.psyassistant: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: psy-assistant
  care-plans:
    max-active-per-client: 3
    intervention-types:
      - CBT
      - DBT
      - EMDR
      - PSYCHODYNAMIC
      - MINDFULNESS
      - BEHAVIORAL_ACTIVATION
      - EXPOSURE_THERAPY
      - SOLUTION_FOCUSED
  caseload:
    active-client-days: 90
    job-enabled: true
    job-cron: "0 0 2 * * *"
  security:
    token-ttl:
      admin:
        access: PT15M
        refresh: PT24H
      user:
        access: PT60M
        refresh: P15D
    session:
      max:
        admin: 1
        user: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

session:
  notes:
    encryption-key: ${SESSION_NOTES_ENCRYPTION_KEY}
