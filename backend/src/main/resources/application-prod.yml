spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    clean-disabled: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.10.146:5432/psyassistant_prod}
    username: ${DB_USERNAME:psyassistant}
    password: ${DB_PASSWORD:psyassistant}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
logging:
  level:
    root: WARN
    com.psyassistant: INFO
