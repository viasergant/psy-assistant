spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  flyway:
    enabled: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test-password

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  frontend-base-url: http://localhost:4200
  jwt:
    secret: test-secret-key-that-is-at-least-32-bytes-long
    issuer: psy-assistant
  security:
    lockout:
      max-attempts: 5
      duration-minutes: 30
    password:
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special-char: true
    password-reset:
      token-ttl-hours: 24
    token-ttl:
      admin:
        access: PT15M
        refresh: PT24H
      user:
        access: PT60M
        refresh: P15D
    session:
      max:
        admin: 1
        user: 5
  cors:
    allowed-origins: http://localhost:4200
  care-plans:
    max-active-per-client: 3
    intervention-types:
      - CBT
      - DBT
  caseload:
    active-client-days: 90
    job-enabled: false
    job-cron: "0 0 2 * * *"
  reports:
    churn-threshold-days: 90
    max-history-years: 3
    export-row-cap: 50000
    default-page-size: 25
  invoices:
    payment-terms-days: 14
    pdf-storage-path: /tmp/test-invoices/pdf

session:
  notes:
    encryption-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

notifications:
  email:
    sender-address: ""
    sender-name: PSY Assistant Test
    webhook-secret: test-webhook-secret
    max-retries: 5
    outbox:
      poll-interval-ms: 60000
      batch-size: 10

