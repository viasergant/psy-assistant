spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-bytes-long
    issuer: psy-assistant
  security:
    token-ttl:
      admin:
        access: PT15M
        refresh: PT24H
      user:
        access: PT60M
        refresh: P15D
    session:
      max:
        admin: 1
        user: 5
  cors:
    allowed-origins: http://localhost:4200
