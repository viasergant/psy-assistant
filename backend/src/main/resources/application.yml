spring:
  application:
    name: psy-assistant
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.10.146:5432/psyassistant}
    username: ${DB_USERNAME:psyassistant}
    password: ${DB_PASSWORD:psyassistant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 10s
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  level:
    root: INFO
    com.psyassistant: INFO
