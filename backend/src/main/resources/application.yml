spring:
  application:
    name: psy-assistant
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.10.146:5432/psyassistant}
    username: ${DB_USERNAME:psyassistant}
    password: ${DB_PASSWORD:psyassistant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    debug: true
    username: ${GMAIL_USERNAME:alphanet.vin@gmail.com}
    password: ${GMAIL_APP_PASSWORD}
    host: smtp.gmail.com
    port: 465
    protocol: smtp
    transport:
      protocol: smtp
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
          timeout: 10000
          connectiontimeout: 20000
          writetimeout: 20000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 10s
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.psyassistant: INFO

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET}
    issuer: psy-assistant
  care-plans:
    max-active-per-client: 3
    intervention-types:
      - CBT
      - DBT
      - EMDR
      - PSYCHODYNAMIC
      - MINDFULNESS
      - BEHAVIORAL_ACTIVATION
      - EXPOSURE_THERAPY
      - SOLUTION_FOCUSED
  caseload:
    active-client-days: 90
    job-enabled: true
    job-cron: "0 0 2 * * *"
  reports:
    churn-threshold-days: 90
    max-history-years: 3
    export-row-cap: 50000
    default-page-size: 25
  invoices:
    payment-terms-days: 14
    pdf-storage-path: ${INVOICE_PDF_STORAGE_PATH:invoices/pdf}
  security:
    lockout:
      max-attempts: 5
      duration-minutes: 30
    password:
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special-char: true
    password-reset:
      token-ttl-hours: 24
    token-ttl:
      admin:
        access: PT15M
        refresh: PT24H
      user:
        access: PT60M
        refresh: P15D
    session:
      max:
        admin: 1
        user: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

session:
  notes:
    encryption-key: ${SESSION_NOTES_ENCRYPTION_KEY}

notifications:
  email:
    sender-address: ${EMAIL_SENDER_ADDRESS:alphanet.vin@gmail.com}
    sender-name: ${EMAIL_SENDER_NAME:PSY Assistant}
    webhook-secret: ${EMAIL_WEBHOOK_SECRET}
    max-retries: 5
    outbox:
      poll-interval-ms: 5000
      batch-size: 10

